name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        uses: jdx/mise-action@v2
        with:
          cache: true
          install: true

      - name: Install dependencies
        run: aube install --frozen-lockfile

      - name: Lint
        run: aube run lint

      - name: Format check
        run: aube run format

      - name: Type check, build & test
        run: turbo run typecheck build test
